baseURL = 'https://www.loginqueue.com/'
languageCode = 'en-us'
title = 'loginqueue'
theme = 'loginqueue'

[caches]
    [caches.images]
        dir = ':cacheDir/images'

[params]
  # Each tile appears on the home page.
  # Fields: title, description, link, color (accent hex), image (optional path under /static)
  [[params.tiles]]
    title       = "Premodern Magic"
    description = "Six deck gauntlet"
    link        = "/magic/"
    color       = "#f6c177"   # gold

  [[params.tiles]]
    title       = "2025 books"
    description = "Matt's awards for books he likes"
    link        = "/posts/2025-books/"
    color       = "#c4a7e7"   # iris
    image       = "/images/tainted-cup.png"
