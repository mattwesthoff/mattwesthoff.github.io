{{ define "main" }}
<article class="post">
  <header class="post-header">
    <a href="{{ "/" | relURL }}" class="back-link">← home</a>
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "January 2, 2006" }}</time>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
