{{ define "main" }}
<div class="page-header">
  <a href="{{ "/" | relURL }}" class="back-link">← home</a>
  <h1>{{ .Title }}</h1>
</div>
{{ with .Content }}<div class="post-content" style="margin-bottom: 2rem;">{{ . }}</div>{{ end }}
<div class="deck-tiles-grid">
  {{ range .Pages }}
  <a class="tile" href="{{ .RelPermalink }}" style="--tile-accent: {{ default "#f6c177" .Params.color }}">
    <div class="tile-image"{{ with .Params.image }} style="background-image: url('{{ . }}')"{{ end }}></div>
    <div class="tile-footer">
      <h2 class="tile-title">{{ .Title }}</h2>
      {{ with .Summary }}<p class="tile-desc">{{ . }}</p>{{ end }}
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
